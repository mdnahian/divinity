name: Build Playtest Image

on:
  push:
    branches: [main]
    paths:
      - "playtest/**"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute image tag
        id: tag
        run: echo "TAG=$(git log --oneline -- playtest/ | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./playtest
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/divinity-playtest:${{ steps.tag.outputs.TAG }}
            ghcr.io/${{ github.repository_owner }}/divinity-playtest:latest
